<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GoDz | Algerian Elite Rides</title>
    <!-- Libraries -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --green: #00FF41; --bg: #0A0A0A; --glass: rgba(26, 26, 26, 0.95); }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }
        #map { height: 100vh; width: 100%; position: fixed; z-index: 1; filter: contrast(1.1) brightness(0.8); }
        
        /* UI Styling */
        .overlay { position: absolute; z-index: 1000; width: 100%; pointer-events: none; }
        .overlay * { pointer-events: auto; }
        
        .godz-card { background: var(--glass); backdrop-filter: blur(15px); border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); padding: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.6); }
        
        .btn-godz { background: var(--green); color: black; font-weight: 800; border: none; border-radius: 16px; padding: 16px; width: 100%; font-size: 1.1rem; }
        .price-tag { background: var(--green); color: black; padding: 4px 12px; border-radius: 10px; font-weight: 900; font-size: 1.3rem; }
        
        /* Search suggest styling */
        .search-results { background: #111; border-radius: 12px; max-height: 250px; overflow-y: auto; display: none; margin-top: 8px; border: 1px solid #333; }
        .result-item { padding: 14px; border-bottom: 1px solid #222; cursor: pointer; font-size: 0.9rem; }
        .result-item:hover { background: #222; }

        #auth-screen { background: var(--bg); position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        
        /* Car Marker animation */
        .car-icon { font-size: 28px; transition: transform 0.5s linear; text-shadow: 0 0 10px var(--green); }
        
        audio { display: none; }
    </style>
</head>
<body>

<div id="map"></div>
<audio id="ping-snd" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3"></audio>

<!-- Auth -->
<div id="auth-screen">
    <div class="godz-card w-100 mx-4" style="max-width: 400px;">
        <div class="text-center mb-4">
            <h1 style="color: var(--green); font-weight: 900; letter-spacing: -2px; font-size: 3rem;">GoDz</h1>
            <p class="text-secondary small">The Smartest Way to Move in DZ</p>
        </div>
        <input type="text" id="a-name" class="form-control bg-dark text-white border-0 mb-3 p-3" placeholder="Full Name">
        <input type="tel" id="a-phone" class="form-control bg-dark text-white border-0 mb-3 p-3" placeholder="Phone Number">
        <input type="password" id="a-pass" class="form-control bg-dark text-white border-0 mb-3 p-3" placeholder="Password">
        <select id="a-role" class="form-select bg-dark text-white border-0 mb-4 p-3">
            <option value="passenger">I am a Passenger</option>
            <option value="driver">I am a Driver</option>
        </select>
        <button class="btn-godz mb-2" onclick="auth('register')">GET STARTED</button>
        <button class="btn btn-link text-white-50 w-100 btn-sm" onclick="auth('login')">Already have an account? Sign In</button>
    </div>
</div>

<!-- Passenger UI -->
<div id="ui-passenger" class="overlay d-none">
    <div class="p-3 mt-2">
        <div class="godz-card">
            <div class="d-flex align-items-center">
                <i class="fa fa-search text-secondary me-2"></i>
                <input type="text" id="p-search" class="form-control bg-transparent border-0 text-white" placeholder="Where are you going?" oninput="searchPlaces(this.value)">
            </div>
            <div id="p-results" class="search-results"></div>
        </div>
    </div>
    
    <div class="fixed-bottom p-3 mb-2">
        <div class="godz-card">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <span class="text-secondary">Total Fare</span>
                <span class="price-tag" id="p-price">0 DA</span>
            </div>
            <button class="btn-godz" id="btn-request" onclick="requestRide()">CONFIRM BOOKING</button>
            <div id="p-waiting" class="text-center d-none py-2">
                <div class="spinner-border text-success mb-2"></div>
                <p class="small mb-0">Searching for nearby GoDz Drivers...</p>
            </div>
        </div>
    </div>
</div>

<!-- Driver UI -->
<div id="ui-driver" class="overlay fixed-bottom d-none">
    <div class="godz-card mx-3 mb-4" style="max-height: 50vh; overflow-y: auto;">
        <h5 class="fw-bold mb-3"><i class="fa fa-bolt text-warning me-2"></i>Live Ride Requests</h5>
        <div id="d-jobs"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

<script>
    const API = "https://script.google.com/macros/s/AKfycbypKALOcZ2mm7vPqii_Lzddkm4W5AiPoYc3Hm4s60QHlyxa1VDqKlXOw3p5qqw1K5Hpmw/exec";
    let user = JSON.parse(localStorage.getItem('godz_user'));
    let map, uMark, dMark, route, rideId, destData;

    window.onload = () => { if(user) startApp(); };

    async function call(action, data) {
        const r = await fetch(API, { method: 'POST', body: JSON.stringify({ action, data }) });
        return await r.json();
    }

    async function auth(action) {
        const data = { name: document.getElementById('a-name').value, phone: document.getElementById('a-phone').value, pass: document.getElementById('a-pass').value, role: document.getElementById('a-role').value };
        const res = await call(action, data);
        if(res.status === 'success') {
            localStorage.setItem('godz_user', JSON.stringify(res.user || {phone: data.phone, role: data.role, name: data.name}));
            location.reload();
        } else alert("Auth failed. Check details.");
    }

    function startApp() {
        document.getElementById('auth-screen').remove();
        document.getElementById(user.role === 'passenger' ? 'ui-passenger' : 'ui-driver').classList.remove('d-none');
        
        navigator.geolocation.getCurrentPosition(pos => {
            const { latitude, longitude } = pos.coords;
            map = L.map('map', { zoomControl: false }).setView([latitude, longitude], 15);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            uMark = L.marker([latitude, longitude]).addTo(map);
            
            // Location reporting & Driver job polling
            setInterval(() => reportLoc(), 10000);
            if(user.role === 'driver') pollJobs();
        });
    }

    async function searchPlaces(q) {
        if(q.length < 3) return;
        const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}&countrycodes=dz`);
        const data = await r.json();
        const resDiv = document.getElementById('p-results');
        resDiv.innerHTML = ''; resDiv.style.display = 'block';
        data.forEach(p => {
            const d = document.createElement('div');
            d.className = 'result-item';
            d.innerText = p.display_name;
            d.onclick = () => selectDest(p);
            resDiv.appendChild(d);
        });
    }

    function selectDest(p) {
        document.getElementById('p-results').style.display = 'none';
        document.getElementById('p-search').value = p.display_name.split(',')[0];
        destData = { lat: p.lat, lon: p.lon, name: p.display_name };
        
        if(route) map.removeControl(route);
        route = L.Routing.control({
            waypoints: [ L.latLng(uMark.getLatLng().lat, uMark.getLatLng().lng), L.latLng(p.lat, p.lon) ],
            lineOptions: { styles: [{ color: '#00FF41', weight: 7 }] },
            createMarker: () => null
        }).on('routesfound', e => {
            const dist = e.routes[0].summary.totalDistance / 1000;
            const fare = Math.round(dist * 30); // 30 DA Per KM
            const finalFare = fare < 150 ? 150 : fare; // Min 150 DA
            document.getElementById('p-price').innerText = finalFare + " DA";
            destData.price = finalFare;
        }).addTo(map);
    }

    async function requestRide() {
        if(!destData) return alert("Please select a place first!");
        document.getElementById('btn-request').style.display = 'none';
        document.getElementById('p-waiting').classList.remove('d-none');
        const res = await call('postRide', { phone: user.phone, name: user.name, lat: uMark.getLatLng().lat, lng: uMark.getLatLng().lng, destName: destData.name, destLat: destData.lat, destLon: destData.lon, price: destData.price });
        rideId = res.rideId;
        sync();
    }

    async function pollJobs() {
        const res = await call('getJobs', {});
        const container = document.getElementById('d-jobs');
        if(res.jobs.length > 0) document.getElementById('ping-snd').play();
        container.innerHTML = res.jobs.map(j => `
            <div class="job-card mb-2 p-3 border-0 bg-dark rounded-4">
                <div class="d-flex justify-content-between">
                    <span class="small text-secondary">To: ${j.destName.split(',')[0]}</span>
                    <span class="text-success fw-bold">${j.price} DA</span>
                </div>
                <button class="btn-godz py-2 mt-2" style="font-size:0.9rem" onclick="acceptJob('${j.id}')">ACCEPT RIDE</button>
            </div>
        `).join('') || '<p class="text-secondary small text-center">Scanning for passengers...</p>';
        setTimeout(pollJobs, 10000);
    }

    async function acceptJob(id) {
        const res = await call('acceptRide', { rideId: id, driverPhone: user.phone, driverName: user.name });
        if(res.status === 'success') { rideId = id; sync(); alert("Go to the passenger on map!"); }
    }

    async function sync() {
        const res = await call('sync', { rideId });
        if(res.ride && res.ride.status === 'accepted') {
            document.getElementById('p-waiting').innerHTML = `<h5 class="text-success"><i class="fa fa-check-circle me-2"></i>Driver is coming!</h5>`;
            if(res.driverLoc) {
                if(!dMark) dMark = L.marker([res.driverLoc.lat, res.driverLoc.lng], { icon: L.divIcon({html: '<i class="fa fa-car car-icon" style="color:#00FF41"></i>', className:'c-icon'})}).addTo(map);
                else dMark.setLatLng([res.driverLoc.lat, res.driverLoc.lng]);
            }
        }
        setTimeout(sync, 8000);
    }

    function reportLoc() {
        navigator.geolocation.getCurrentPosition(p => {
            uMark.setLatLng([p.coords.latitude, p.coords.longitude]);
            call('updateLoc', { phone: user.phone, lat: p.coords.latitude, lng: p.coords.longitude });
        });
    }
</script>
</body>
</html>
