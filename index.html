<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GoDz | Elite Algeria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --green: #00FF41; --bg: #0D0D0D; --card: #1A1A1A; }
        body { background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100%; position: fixed; z-index: 1; }
        
        /* UI Overlays */
        .overlay { position: absolute; z-index: 10; width: 100%; pointer-events: none; }
        .overlay * { pointer-events: auto; }
        
        .search-container { top: 20px; padding: 0 15px; }
        .search-box { background: var(--card); border-radius: 12px; padding: 10px; border: 1px solid #333; }
        .results-dropdown { background: var(--card); border-radius: 0 0 12px 12px; max-height: 200px; overflow-y: auto; display: none; }
        .result-item { padding: 10px; border-bottom: 1px solid #333; cursor: pointer; font-size: 14px; }
        
        .bottom-sheet { bottom: 0; background: var(--card); border-radius: 25px 25px 0 0; padding: 20px; box-shadow: 0 -10px 30px rgba(0,0,0,0.5); }
        
        .price-badge { background: var(--green); color: black; font-weight: 900; padding: 5px 15px; border-radius: 8px; font-size: 20px; }
        .btn-godz { background: var(--green); color: black; font-weight: 800; border-radius: 12px; border: none; width: 100%; padding: 15px; }
        
        .driver-card { background: rgba(255,255,255,0.05); border: 1px solid #333; border-radius: 15px; padding: 15px; margin-bottom: 10px; }
        
        /* Icons */
        .car-icon { font-size: 24px; filter: drop-shadow(0 0 5px var(--green)); }
    </style>
</head>
<body>

<div id="map"></div>

<!-- Passenger View -->
<div id="ui-passenger" class="overlay search-container d-none">
    <div class="search-box">
        <input type="text" id="address-input" class="form-control bg-transparent border-0 text-white" placeholder="Where to?" oninput="searchPlaces(this.value)">
        <div id="search-results" class="results-dropdown"></div>
    </div>
    
    <div class="bottom-sheet fixed-bottom" id="p-sheet">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <span class="text-secondary">Estimated Price</span>
            <span class="price-badge" id="price-display">-- DA</span>
        </div>
        <button id="main-btn" class="btn-godz" onclick="requestRide()">REQUEST GODZ</button>
        <div id="ride-status" class="mt-3 text-center d-none">
            <div class="spinner-border text-success spinner-border-sm me-2"></div>
            <span id="status-text">Finding Driver...</span>
        </div>
    </div>
</div>

<!-- Driver View -->
<div id="ui-driver" class="overlay fixed-bottom d-none">
    <div class="bottom-sheet" style="height: 40vh; overflow-y: scroll;">
        <h5 class="fw-bold mb-3">Available Jobs</h5>
        <div id="job-list"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbypKALOcZ2mm7vPqii_Lzddkm4W5AiPoYc3Hm4s60QHlyxa1VDqKlXOw3p5qqw1K5Hpmw/exec";
    let user = JSON.parse(localStorage.getItem('godz_user'));
    let map, userMarker, driverMarker, destMarker, currentRideId = null;
    let selectedDest = null;

    window.onload = () => {
        if(!user) { /* Redirect to login or show auth logic here */ return; }
        initApp();
    };

    function initApp() {
        if(user.role === 'passenger') document.getElementById('ui-passenger').classList.remove('d-none');
        else document.getElementById('ui-driver').classList.remove('d-none');
        
        navigator.geolocation.getCurrentPosition(pos => {
            map = L.map('map', { zoomControl: false }).setView([pos.coords.latitude, pos.coords.longitude], 15);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            
            userMarker = L.marker([pos.coords.latitude, pos.coords.longitude]).addTo(map);
            
            // Start location reporting
            setInterval(() => reportLocation(pos.coords.latitude, pos.coords.longitude), 10000);
            if(user.role === 'driver') pollJobs();
        });
    }

    // --- Place Search Logic ---
    async function searchPlaces(query) {
        if(query.length < 3) return;
        const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}&countrycodes=dz`);
        const data = await res.json();
        const container = document.getElementById('search-results');
        container.innerHTML = '';
        container.style.display = 'block';
        
        data.forEach(item => {
            const div = document.createElement('div');
            div.className = 'result-item';
            div.innerText = item.display_name;
            div.onclick = () => selectDestination(item);
            container.appendChild(div);
        });
    }

    function selectDestination(item) {
        document.getElementById('address-input').value = item.display_name;
        document.getElementById('search-results').style.display = 'none';
        selectedDest = { lat: parseFloat(item.lat), lng: parseFloat(item.lon), name: item.display_name };
        
        if(destMarker) map.removeLayer(destMarker);
        destMarker = L.marker([selectedDest.lat, selectedDest.lng], {icon: L.divIcon({html: '📍'})}).addTo(map);
        
        // Calculate Distance and Price
        const dist = map.distance(userMarker.getLatLng(), [selectedDest.lat, selectedDest.lng]) / 1000;
        const price = Math.round(150 + (dist * 50));
        document.getElementById('price-display').innerText = price + " DA";
        selectedDest.price = price;
    }

    // --- Ride Lifecycle ---
    async function requestRide() {
        if(!selectedDest) return alert("Select a place first!");
        
        const res = await fetch(API_URL, {
            method: 'POST',
            body: JSON.stringify({
                action: 'postRide',
                data: {
                    phone: user.phone,
                    name: user.name,
                    pickupLat: userMarker.getLatLng().lat,
                    pickupLng: userMarker.getLatLng().lng,
                    destLat: selectedDest.lat,
                    destLng: selectedDest.lng,
                    destName: selectedDest.name,
                    price: selectedDest.price
                }
            })
        });
        const json = await res.json();
        if(json.status === 'success') {
            currentRideId = json.rideId;
            document.getElementById('main-btn').style.display = 'none';
            document.getElementById('ride-status').classList.remove('d-none');
            syncRide();
        }
    }

    async function syncRide() {
        const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'syncRide', data: { rideId: currentRideId } }) });
        const json = await res.json();
        
        if(json.status === 'success') {
            if(json.ride.status === 'accepted' && json.driverLoc) {
                document.getElementById('status-text').innerText = "Driver is tracking your location...";
                if(!driverMarker) driverMarker = L.marker([json.driverLoc.lat, json.driverLoc.lng], {icon: L.divIcon({html: '🚗', className: 'car-icon'})}).addTo(map);
                else driverMarker.setLatLng([json.driverLoc.lat, json.driverLoc.lng]);
                
                // Zoom map to show both
                const group = new L.featureGroup([userMarker, driverMarker]);
                map.fitBounds(group.getBounds().pad(0.2));
            }
            setTimeout(syncRide, 5000);
        }
    }

    // --- Driver Logic ---
    async function pollJobs() {
        const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'getJobs' }) });
        const json = await res.json();
        const container = document.getElementById('job-list');
        container.innerHTML = json.jobs.map(j => `
            <div class="driver-card">
                <div class="d-flex justify-content-between">
                    <span><b>${j.destName.split(',')[0]}</b></span>
                    <span class="text-success fw-bold">${j.price} DA</span>
                </div>
                <button class="btn btn-sm btn-success w-100 mt-2" onclick="acceptJob('${j.id}')">ACCEPT JOB</button>
            </div>
        `).join('') || '<p class="text-secondary">No riders nearby...</p>';
        setTimeout(pollJobs, 7000);
    }

    async function acceptJob(id) {
        const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'acceptRide', data: { rideId: id, driverPhone: user.phone } }) });
        const json = await res.json();
        if(json.status === 'success') {
            currentRideId = id;
            alert("Job Accepted! Head to pickup.");
            syncRide();
        }
    }

    async function reportLocation(lat, lng) {
        fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'updateLocation', data: { phone: user.phone, lat, lng } }) });
    }
</script>
</body>
</html>
