<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GoDz | Tri9ek, b'shwaya</title>
    <!-- CSS: Electric Green & Charcoal -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --green: #00FF41; --bg: #0D0D0D; --card: #1A1A1A; --text: #FFFFFF; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        .godz-card { background: var(--card); border-radius: 20px; padding: 20px; margin: 15px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn-godz { background: var(--green); color: black; font-weight: 800; border-radius: 12px; border: none; padding: 15px; width: 100%; transition: 0.3s; }
        .btn-godz:active { transform: scale(0.98); }
        input, select { background: #222 !important; border: 1px solid #444 !important; color: white !important; padding: 12px !important; border-radius: 10px !important; margin-bottom: 15px; }
        #map { height: 100vh; width: 100%; position: fixed; top: 0; z-index: 1; }
        .ui-layer { position: relative; z-index: 10; pointer-events: none; }
        .ui-layer * { pointer-events: auto; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #111; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #333; z-index: 100; }
        .nav-item { color: #555; font-size: 24px; cursor: pointer; }
        .nav-item.active { color: var(--green); }
        .loader { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--bg); }
        .pulse { width: 80px; height: 80px; background: var(--green); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: black; font-weight: bold; font-size: 2rem; box-shadow: 0 0 20px var(--green); animation: p 1.5s infinite; }
        @keyframes p { 0%, 100% { transform: scale(0.9); } 50% { transform: scale(1.1); } }
    </style>
</head>
<body>

<div id="app">
    <!-- View: Loading -->
    <div id="v-load" class="loader">
        <div class="pulse">G</div>
        <p class="mt-4 text-secondary">GoDz Loading...</p>
    </div>

    <!-- View: Login/Signup -->
    <div id="v-auth" class="d-none container py-5">
        <div class="text-center mb-5">
            <h1 style="color:var(--green); font-weight:900; font-size:3.5rem;">GoDz</h1>
            <p class="text-secondary">Tri9ek, b'shwaya</p>
        </div>
        <div class="godz-card">
            <input type="tel" id="phone" placeholder="Phone Number">
            <input type="password" id="pass" placeholder="Password">
            <select id="role">
                <option value="passenger">Passenger</option>
                <option value="driver">Driver</option>
            </select>
            <button class="btn-godz" onclick="auth('login')">LOGIN</button>
            <button class="btn btn-link w-100 text-secondary mt-3" onclick="auth('register')">Create Account</button>
        </div>
    </div>

    <!-- View: Map (Passenger/Driver Overlay) -->
    <div id="v-main" class="d-none">
        <div id="map"></div>
        <div class="ui-layer">
            <div id="p-controls" class="fixed-bottom mb-5 d-none">
                <div class="godz-card">
                    <input type="text" id="dest" placeholder="Where to?">
                    <button class="btn-godz" onclick="requestRide()">REQUEST RIDE</button>
                </div>
            </div>
            <div id="d-controls" class="container mt-3 d-none">
                <div id="job-list"></div>
            </div>
        </div>
        <nav class="bottom-nav">
            <div class="nav-item active"><i class="fas fa-home"></i></div>
            <div class="nav-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i></div>
        </nav>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbypKALOcZ2mm7vPqii_Lzddkm4W5AiPoYc3Hm4s60QHlyxa1VDqKlXOw3p5qqw1K5Hpmw/exec"; 
    let user = JSON.parse(localStorage.getItem('godz_user'));
    let map, userMarker;

    window.onload = () => {
        if (user) showMain(); else showAuth();
    };

    async function callApi(action, data) {
        const response = await fetch(API_URL, {
            method: 'POST',
            body: JSON.stringify({ action, data })
        });
        return await response.json();
    }

    function showAuth() {
        document.getElementById('v-load').classList.add('d-none');
        document.getElementById('v-auth').classList.remove('d-none');
    }

    function showMain() {
        document.getElementById('v-load').classList.add('d-none');
        document.getElementById('v-auth').classList.add('d-none');
        document.getElementById('v-main').classList.remove('d-none');
        
        initMap();
        if (user.role === 'passenger') {
            document.getElementById('p-controls').classList.remove('d-none');
        } else {
            document.getElementById('d-controls').classList.remove('d-none');
            pollJobs();
        }
    }

    async function auth(type) {
        const data = {
            phone: document.getElementById('phone').value,
            pass: document.getElementById('pass').value,
            role: document.getElementById('role').value,
            name: "User"
        };
        const res = await callApi(type, data);
        if (res.status === 'success') {
            localStorage.setItem('godz_user', JSON.stringify(res.user));
            user = res.user;
            location.reload();
        } else { alert(res.message); }
    }

    function initMap() {
        navigator.geolocation.getCurrentPosition(pos => {
            const { latitude, longitude } = pos.coords;
            map = L.map('map', { zoomControl: false }).setView([latitude, longitude], 15);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            userMarker = L.marker([latitude, longitude]).addTo(map);
            
            setInterval(() => {
                callApi('updateLocation', { phone: user.phone, role: user.role, lat: latitude, lng: longitude });
            }, 30000);
        });
    }

    async function requestRide() {
        navigator.geolocation.getCurrentPosition(async pos => {
            const res = await callApi('postRide', {
                phone: user.phone,
                dest: document.getElementById('dest').value,
                lat: pos.coords.latitude,
                lng: pos.coords.longitude
            });
            if (res.status === 'success') alert("GoDz Searching...");
        });
    }

    async function pollJobs() {
        navigator.geolocation.getCurrentPosition(async pos => {
            const res = await callApi('getJobs', { lat: pos.coords.latitude, lng: pos.coords.longitude });
            const list = document.getElementById('job-list');
            list.innerHTML = res.jobs.length ? res.jobs.map(j => `
                <div class="godz-card border-success">
                    <p class="mb-1"><b>Dest:</b> ${j.dest}</p>
                    <button class="btn-godz btn-sm" onclick="alert('Accepted')">ACCEPT</button>
                </div>
            `).join('') : '<p class="text-center text-secondary">Searching for riders...</p>';
        });
        setTimeout(pollJobs, 5000);
    }

    function logout() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
