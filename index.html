<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GoDz Ultra | Algeria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --green: #00FF41; --bg: #050505; --card: rgba(20, 20, 20, 0.95); }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }
        #map { height: 100vh; width: 100%; position: fixed; z-index: 1; }
        
        .ui-overlay { position: absolute; z-index: 1000; width: 100%; pointer-events: none; }
        .ui-overlay * { pointer-events: auto; }
        
        .glass-card { background: var(--card); backdrop-filter: blur(15px); border-radius: 28px; border: 1px solid rgba(255,255,255,0.08); padding: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); margin: 15px; }
        
        /* Vehicle Selector */
        .v-type { border: 2px solid transparent; border-radius: 15px; padding: 10px; cursor: pointer; transition: 0.3s; background: rgba(255,255,255,0.05); }
        .v-type.active { border-color: var(--green); background: rgba(0, 255, 65, 0.1); }

        .btn-godz { background: var(--green); color: black; font-weight: 900; border: none; border-radius: 18px; padding: 18px; width: 100%; font-size: 1.1rem; }
        .price-badge { background: var(--green); color: black; padding: 4px 15px; border-radius: 10px; font-weight: 900; }
        
        #search-box { position: absolute; top: 20px; width: 100%; }
        .search-results { background: #111; border-radius: 15px; margin-top: 5px; max-height: 200px; overflow-y: auto; display: none; }
        .result-item { padding: 12px; border-bottom: 1px solid #222; font-size: 14px; cursor: pointer; }

        /* Auth UI */
        #auth-screen { background: var(--bg); position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        
        .car-marker { font-size: 30px; text-shadow: 0 0 10px var(--green); transition: 0.5s; }
        .eta-label { background: var(--green); color: black; padding: 2px 8px; border-radius: 5px; font-size: 10px; font-weight: bold; position: absolute; top: -20px; left: 0; }
    </style>
</head>
<body>

<div id="map"></div>

<!-- Auth Screen -->
<div id="auth-screen">
    <div class="glass-card w-100 mx-4" style="max-width: 400px;">
        <h1 class="text-center fw-900 mb-4" style="color: var(--green); letter-spacing: -2px;">GoDz</h1>
        <input type="text" id="a-name" class="form-control bg-dark border-0 text-white mb-3 p-3" placeholder="Full Name">
        <input type="tel" id="a-phone" class="form-control bg-dark border-0 text-white mb-3 p-3" placeholder="Phone Number">
        <input type="password" id="a-pass" class="form-control bg-dark border-0 text-white mb-3 p-3" placeholder="Password">
        <select id="a-role" class="form-select bg-dark border-0 text-white mb-4 p-3">
            <option value="passenger">I need a ride</option>
            <option value="driver">I am a driver</option>
        </select>
        <button class="btn-godz" onclick="handleAuth('register')">CREATE ACCOUNT</button>
        <p class="text-center mt-3 small text-secondary" onclick="handleAuth('login')">Already registered? Sign In</p>
    </div>
</div>

<!-- Passenger UI -->
<div id="ui-passenger" class="ui-overlay d-none">
    <div id="search-box" class="px-3">
        <div class="glass-card py-2">
            <div class="d-flex align-items-center">
                <i class="fa fa-map-pin text-success me-3"></i>
                <input type="text" id="p-dest" class="form-control bg-transparent border-0 text-white" placeholder="Where to? (or tap map)" oninput="searchPlaces(this.value)">
            </div>
            <div id="p-res" class="search-results"></div>
        </div>
    </div>

    <div class="fixed-bottom p-3">
        <div class="glass-card mb-2 text-center py-2 d-none" id="tap-hint" style="background: var(--green); color: black; font-weight: bold;">
            Tap anywhere on the map to set destination!
        </div>
        <div class="glass-card">
            <div class="d-flex gap-2 mb-3">
                <div class="v-type active w-50 text-center" id="v-eco" onclick="setV('eco')">
                    <i class="fa fa-car mb-1"></i><br><small>Economy<br>30 DA/km</small>
                </div>
                <div class="v-type w-50 text-center" id="v-luxe" onclick="setV('luxe')">
                    <i class="fa fa-crown mb-1"></i><br><small>Luxe<br>60 DA/km</small>
                </div>
            </div>
            <div class="d-flex justify-content-between align-items-center mb-3">
                <span id="dist-info" class="small text-secondary">0.0 km</span>
                <span class="price-badge" id="p-price">0 DA</span>
            </div>
            <button class="btn-godz" id="btn-order" onclick="requestRide()">ORDER GODZ</button>
            <div id="p-status" class="d-none text-center py-2">
                <div class="spinner-border text-success spinner-border-sm mb-2"></div>
                <p class="mb-0 small fw-bold">Connecting to drivers...</p>
            </div>
        </div>
    </div>
</div>

<!-- Driver UI -->
<div id="ui-driver" class="ui-overlay fixed-bottom d-none">
    <div class="glass-card mx-3 mb-4" style="max-height: 40vh; overflow-y: auto;">
        <h6 class="fw-bold mb-3"><i class="fa fa-bolt me-2 text-success"></i>NEW REQUESTS</h6>
        <div id="d-jobs"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

<script>
    const API = "https://script.google.com/macros/s/AKfycbypKALOcZ2mm7vPqii_Lzddkm4W5AiPoYc3Hm4s60QHlyxa1VDqKlXOw3p5qqw1K5Hpmw/exec";
    let user = JSON.parse(localStorage.getItem('godz_user'));
    let map, uMark, dMark, tMark, route, rideId, destCoords, vMode = 'eco';

    window.onload = () => { if(user) startApp(); };

    async function handleAuth(action) {
        const data = { name: document.getElementById('a-name').value, phone: document.getElementById('a-phone').value, pass: document.getElementById('a-pass').value, role: document.getElementById('a-role').value };
        const res = await fetch(API, { method: 'POST', body: JSON.stringify({ action, data }) });
        const json = await res.json();
        if(json.status === 'success') {
            localStorage.setItem('godz_user', JSON.stringify(json.user));
            location.reload();
        } else alert("Error: Try another phone number.");
    }

    function startApp() {
        document.getElementById('auth-screen').remove();
        document.getElementById(user.role === 'passenger' ? 'ui-passenger' : 'ui-driver').classList.remove('d-none');
        
        navigator.geolocation.getCurrentPosition(pos => {
            const { latitude, longitude } = pos.coords;
            map = L.map('map', { zoomControl: false }).setView([latitude, longitude], 15);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            uMark = L.marker([latitude, longitude]).addTo(map);
            
            // Feature: Map Click Manual Selection
            map.on('click', e => {
                if(user.role === 'passenger') selectDest({ lat: e.latlng.lat, lon: e.latlng.lng, display_name: "Manual Point" });
            });

            setInterval(reportLoc, 10000);
            if(user.role === 'driver') pollJobs();
        });
    }

    async function searchPlaces(q) {
        if(q.length < 3) return;
        const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}&countrycodes=dz`);
        const data = await r.json();
        const resDiv = document.getElementById('p-res');
        resDiv.innerHTML = ''; resDiv.style.display = 'block';
        data.forEach(p => {
            const d = document.createElement('div');
            d.className = 'result-item';
            d.innerText = p.display_name;
            d.onclick = () => selectDest(p);
            resDiv.appendChild(d);
        });
    }

    function selectDest(p) {
        document.getElementById('p-res').style.display = 'none';
        document.getElementById('p-dest').value = p.display_name.split(',')[0];
        destCoords = { lat: p.lat, lon: p.lon, name: p.display_name };
        
        if(tMark) map.removeLayer(tMark);
        tMark = L.marker([p.lat, p.lon], {icon: L.divIcon({html:'<i class="fa fa-location-dot text-danger" style="font-size:25px"></i>'})}).addTo(map);

        calcPrice();
    }

    function setV(type) {
        vMode = type;
        document.getElementById('v-eco').classList.toggle('active', type === 'eco');
        document.getElementById('v-luxe').classList.toggle('active', type === 'luxe');
        if(destCoords) calcPrice();
    }

    function calcPrice() {
        const dist = map.distance(uMark.getLatLng(), [destCoords.lat, destCoords.lon]) / 1000;
        const rate = vMode === 'eco' ? 30 : 60;
        const finalPrice = Math.max(150, Math.round(dist * rate + 100)); // 150 DA minimum
        document.getElementById('p-price').innerText = finalPrice + " DA";
        document.getElementById('dist-info').innerText = dist.toFixed(1) + " km";
        destCoords.price = finalPrice;
    }

    async function requestRide() {
        if(!destCoords) return alert("Tap map or search destination!");
        document.getElementById('btn-order').classList.add('d-none');
        document.getElementById('p-status').classList.remove('d-none');
        const res = await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'postRide', data: { ...destCoords, phone: user.phone, pickupLat: uMark.getLatLng().lat, pickupLng: uMark.getLatLng().lng } })});
        const json = await res.json();
        rideId = json.rideId;
        sync();
    }

    async function pollJobs() {
        const res = await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'getJobs' }) });
        const json = await res.json();
        document.getElementById('d-jobs').innerHTML = json.jobs.map(j => `
            <div class="job-card bg-dark border-0 mb-2 p-3 rounded-4">
                <div class="d-flex justify-content-between mb-2">
                    <span class="small text-secondary">To: ${j.name.split(',')[0]}</span>
                    <span class="text-success fw-bold">${j.price} DA</span>
                </div>
                <button class="btn btn-godz py-2" style="font-size:14px" onclick="acceptJob('${j.id}')">ACCEPT</button>
            </div>
        `).join('') || '<p class="text-center text-secondary small">Waiting for passengers...</p>';
        setTimeout(pollJobs, 5000);
    }

    async function acceptJob(id) {
        const res = await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'acceptRide', data: { rideId: id, driverPhone: user.phone, driverName: user.name } }) });
        if((await res.json()).status === 'success') { rideId = id; sync(); }
    }

    async function sync() {
        const res = await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'sync', data: { rideId } }) });
        const json = await res.json();
        if(json.ride && json.ride.status === 'accepted') {
            document.getElementById('p-status').innerHTML = `<h6 class="text-success">Driver matched: ${json.ride.driverName}</h6>`;
            if(json.driverLoc) {
                if(!dMark) dMark = L.marker([json.driverLoc.lat, json.driverLoc.lng], {icon: L.divIcon({html: '<div class="eta-label">ETA 4m</div><i class="fa fa-car car-marker" style="color:#00FF41"></i>', className:''})}).addTo(map);
                else dMark.setLatLng([json.driverLoc.lat, json.driverLoc.lng]);
                
                // Camera Follow
                map.fitBounds(L.latLngBounds([uMark.getLatLng(), dMark.getLatLng()]).pad(0.3));
            }
        }
        setTimeout(sync, 5000);
    }

    function reportLoc() {
        navigator.geolocation.getCurrentPosition(p => {
            uMark.setLatLng([p.coords.latitude, p.coords.longitude]);
            fetch(API, { method: 'POST', body: JSON.stringify({ action: 'updateLoc', data: { phone: user.phone, lat: p.coords.latitude, lng: p.coords.longitude } }) });
        });
    }
</script>
</body>
</html>
